databases:
  - name: smartvest-db
    plan: free
    databaseName: smartvest
    user: smartvest

services:
  - type: web
    name: smartvest
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn finance_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartvest-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: WEB_CONCURRENCY
        value: "2"
