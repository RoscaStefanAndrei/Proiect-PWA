{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block header_title_anon %}Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 70vh; align-items: center;">
    <div class="col-md-5 col-lg-4 col-xl-3">
        <div class="text-center mb-4">
            <div class="logo-icon d-inline-flex mb-3" style="width:48px;height:48px;border-radius:14px;font-size:1.25rem;">
                <i class="fas fa-chart-line"></i>
            </div>
            <h3 class="fw-bold" style="color: var(--text-primary);">Welcome back</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to your SmartVest account</p>
        </div>
        <div class="card p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-3">
                    <button class="btn btn-primary rounded-pill fw-bold py-2" type="submit">Sign In</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small style="color: var(--text-muted);">Don't have an account?
                    <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color: var(--accent);">Sign Up</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
