{% extends 'base.html' %}

{% block title %}Logout{% endblock %}

{% block content %}
<div class="text-center" style="padding-top: 10vh;">
    <div class="empty-state-icon d-inline-flex mb-3">
        <i class="fas fa-sign-out-alt"></i>
    </div>
    <h3 class="fw-bold mb-2" style="color: var(--text-primary);">You've been logged out</h3>
    <p style="color: var(--text-secondary);">Thanks for visiting. See you again soon!</p>
    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4 fw-bold mt-2">Log In Again</a>
</div>
{% endblock %}
