<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background-color:#0f1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f1117;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">
                    <!-- Header -->
                    <tr>
                        <td style="padding-bottom:24px;text-align:center;">
                            <span style="font-size:20px;font-weight:700;color:#ffffff;letter-spacing:0.02em;">SmartVest</span>
                        </td>
                    </tr>

                    <!-- Card -->
                    <tr>
                        <td style="background-color:#1a1d27;border-radius:14px;border:1px solid #2a2d3a;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <!-- Badge -->
                                <tr>
                                    <td style="padding:24px 24px 0;">
                                        <span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;color:{{ meta.color }};background-color:{{ meta.color }}1a;">
                                            {{ meta.label }}
                                        </span>
                                    </td>
                                </tr>

                                <!-- Title -->
                                <tr>
                                    <td style="padding:12px 24px 0;">
                                        <h1 style="margin:0;font-size:18px;font-weight:700;color:#ffffff;line-height:1.4;">
                                            {{ title }}
                                        </h1>
                                    </td>
                                </tr>

                                <!-- Message -->
                                <tr>
                                    <td style="padding:8px 24px 0;">
                                        <p style="margin:0;font-size:14px;color:#9ca3af;line-height:1.6;">
                                            {{ message }}
                                        </p>
                                    </td>
                                </tr>

                                <!-- CTA Button -->
                                {% if link %}
                                <tr>
                                    <td style="padding:20px 24px 0;">
                                        <a href="{{ link }}" target="_blank"
                                           style="display:inline-block;padding:10px 24px;background-color:#3b82f6;color:#ffffff;text-decoration:none;border-radius:10px;font-size:14px;font-weight:600;">
                                            View Details
                                        </a>
                                    </td>
                                </tr>
                                {% endif %}

                                <!-- Spacer -->
                                <tr>
                                    <td style="padding:24px;"></td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding-top:20px;text-align:center;">
                            <p style="margin:0;font-size:12px;color:#4b5563;line-height:1.5;">
                                You're receiving this because you enabled email notifications.<br>
                                <a href="{{ link }}" style="color:#6b7280;text-decoration:underline;">Manage notification settings</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
