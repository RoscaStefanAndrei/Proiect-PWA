{% extends 'base.html' %}
{% block title %}Sign Out{% endblock %}
{% block anon_nav %}{% endblock %}
{% block content_wrapper_class %}p-0{% endblock %}

{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:1rem;">
    <div style="width:100%; max-width:420px;" class="text-center">
        <div class="logo-icon d-inline-flex mb-3" style="width:48px;height:48px;border-radius:14px;font-size:1.25rem;">
            <i class="fas fa-sign-out-alt"></i>
        </div>
        <h3 class="fw-bold mb-2" style="color: var(--text-primary);">Sign out?</h3>
        <p class="mb-4" style="color: var(--text-secondary);">Are you sure you want to sign out of SmartVest?</p>
        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
                <a href="{% url 'home' %}" class="btn btn-outline-light rounded-pill px-4">Cancel</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Sign Out</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
