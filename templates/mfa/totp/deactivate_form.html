{% extends 'base.html' %}
{% block title %}Deactivate Authenticator{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 60vh; align-items: center;">
    <div class="col-md-5 col-lg-4 col-xl-3 text-center">
        <div class="logo-icon d-inline-flex mb-3" style="width:48px;height:48px;border-radius:14px;font-size:1.25rem;background:rgba(239,68,68,0.12);">
            <i class="fas fa-exclamation-triangle" style="color: var(--red);"></i>
        </div>
        <h3 class="fw-bold mb-2" style="color: var(--text-primary);">Deactivate 2FA?</h3>
        <p class="mb-4" style="color: var(--text-secondary); font-size: 0.9rem;">
            This will remove authenticator app protection from your account. You can reactivate it later.
        </p>
        <form method="POST" action="{% url 'mfa_deactivate_totp' %}">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
                <a href="{% url 'mfa_index' %}" class="btn btn-outline-light rounded-pill px-4">Cancel</a>
                <button type="submit" class="btn btn-danger rounded-pill px-4 fw-bold">Deactivate</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
