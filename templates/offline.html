<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVest - Offline</title>
    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 { color: #198754; margin-bottom: 0.5rem; }
        p { color: #adb5bd; line-height: 1.6; }
        .retry-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            background: #198754;
            color: #fff;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
        }
        .retry-btn:hover { background: #157347; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>SmartVest requires an internet connection to fetch live market data. Please check your connection and try again.</p>
        <a href="/" class="retry-btn">Retry</a>
    </div>
</body>
</html>
